<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Débits Rivières ARA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; color: #2c3e50; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { font-size: 1.4rem; border-bottom: 2px solid #007bff; padding-bottom: 12px; text-align: center; margin-bottom: 25px; }
        .selector-group { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .control { flex: 1; min-width: 250px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85em; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
        select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; background-color: #fff; cursor: pointer; transition: border 0.2s; }
        select:focus { border-color: #007bff; outline: none; }
        #debit { font-size: 3.2em; font-weight: bold; color: #007bff; text-align: center; margin-top: 15px; }
        #date { text-align: center; font-size: 0.9em; color: #777; margin-bottom: 25px; height: 1.2em; font-style: italic; }
        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 10px; }
        .footer { margin-top: 30px; font-size: 0.75em; text-align: center; color: #999; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Suivi des débits en temps réel (3 jours)</h1>
    
    <div class="selector-group">
        <div class="control">
            <label>Département</label>
            <select id="deptSelector">
                <option value="">-- Sélectionner --</option>
                <option value="01">01 - Ain</option>
                <option value="03">03 - Allier</option>
                <option value="07">07 - Ardèche</option>
                <option value="15">15 - Cantal</option>
                <option value="26">26 - Drôme</option>
                <option value="38">38 - Isère</option>
                <option value="42">42 - Loire</option>
                <option value="43">43 - Haute-Loire</option>
                <option value="63">63 - Puy-de-Dôme</option>
                <option value="69">69 - Rhône</option>
                <option value="73">73 - Savoie</option>
                <option value="74">74 - Haute-Savoie</option>
            </select>
        </div>
        <div class="control">
            <label>Station de mesure</label>
            <select id="stationSelector" disabled>
                <option value="">Choisissez un département</option>
            </select>
        </div>
    </div>

    <h2 id="stationTitle" style="text-align:center; font-size: 1.2em; color: #2c3e50;"></h2>
    <div id="debit">--</div>
    <div id="date"></div>
    
    <div class="chart-container">
        <canvas id="graph"></canvas>
    </div>

    <div class="footer">Source : API Hub'Eau Hydrométrie • Données actualisées toutes les 10 min</div>
</div>

<script>
let myChart = null;
const DEBIT_ETIAGE = 0.3047;   
const DEBIT_HORS_ETIAGE = 1.55; 

const deptSelector = document.getElementById('deptSelector');
const stationSelector = document.getElementById('stationSelector');

// 1. CHARGEMENT DES STATIONS FILTRÉES (ACTIVES UNIQUEMENT)
deptSelector.addEventListener('change', function() {
    const codeDept = this.value;
    if (!codeDept) return;

    stationSelector.disabled = true;
    stationSelector.innerHTML = '<option>Filtrage des stations actives...</option>';

    // FILTRE CRUCIAL : en_service=true ET grandeur_hydro=Q
    // Cela élimine 80% des stations vides (anciennes ou météo uniquement)
    const url = `https://hubeau.eaufrance.fr/api/v2/hydrometrie/referentiel/stations?code_departement=${codeDept}&en_service=true&grandeur_hydro=Q&format=json&size=600`;

    fetch(url)
        .then(r => r.json())
        .then(json => {
            if (!json.data || json.data.length === 0) {
                stationSelector.innerHTML = '<option value="">Aucune station active trouvée</option>';
                return;
            }

            // On utilise libelle_station pour le nom
            const stations = json.data
                .sort((a, b) => a.libelle_station.localeCompare(b.libelle_station));

            stationSelector.innerHTML = `<option value="">Choisir parmi ${stations.length} stations en service</option>`;
            stations.forEach(s => {
                let opt = document.createElement('option');
                // Attention : pour les données TR, on utilise souvent le code_site (les 8 premiers caractères du code_station)
                // Mais l'API TR accepte aussi le code_station. On reste sur le code_site pour la stabilité.
                opt.value = s.code_site;
                opt.text = `${s.libelle_station} (${s.code_site})`;
                stationSelector.appendChild(opt);
            });
            stationSelector.disabled = false;
        })
        .catch(err => {
            stationSelector.innerHTML = '<option value="">Erreur de chargement</option>';
        });
});

stationSelector.addEventListener('change', function() {
    const codeSite = this.value;
    if (!codeSite) {
        resetDisplay();
        return;
    }
    document.getElementById('stationTitle').innerText = this.options[this.selectedIndex].text;
    updateData(codeSite);
});

function resetDisplay() {
    if (myChart) { myChart.destroy(); myChart = null; }
    document.getElementById("debit").innerText = "--";
    document.getElementById("date").innerText = "";
    document.getElementById('stationTitle').innerText = "";
}

function updateData(codeSite) {
    const NB_JOURS = 3;
    const maintenant = Date.now();
    const limiteTemps = maintenant - NB_JOURS * 24 * 3600 * 1000;

    if (myChart) { myChart.destroy(); myChart = null; }

    const URL_LIVE = `https://hubeau.eaufrance.fr/api/v2/hydrometrie/observations_tr?code_entite=${codeSite}&grandeur_hydro=Q&size=1&sort=DESC`;
    const URL_GRAPH = `https://hubeau.eaufrance.fr/api/v2/hydrometrie/observations_tr?code_entite=${codeSite}&grandeur_hydro=Q&size=1200&sort=DESC`;

    fetch(URL_LIVE).then(r => r.json()).then(json => {
        if (json.data && json.data.length > 0) {
            const obs = json.data[0];
            const q_ls = Number(obs.resultat_obs);
            const q_m3s = q_ls / 1000;
            document.getElementById("debit").innerText = q_m3s >= 1 
                ? q_m3s.toLocaleString("fr-FR", { minimumFractionDigits: 3, maximumFractionDigits: 3 }) + " m³/s"
                : Math.round(q_ls).toLocaleString("fr-FR") + " l/s";
            document.getElementById("date").innerText = "Mesure du " + new Date(obs.date_obs).toLocaleString("fr-FR");
        } else {
            document.getElementById("debit").innerText = "Indisponible";
            document.getElementById("date").innerText = "La station ne transmet plus de données actuellement.";
        }
    });

    fetch(URL_GRAPH).then(r => r.json()).then(json => {
        if (!json.data || json.data.length === 0) return;

        const data = json.data
            .filter(d => new Date(d.date_obs).getTime() >= limiteTemps)
            .sort((a, b) => new Date(a.date_obs) - new Date(b.date_obs));

        if (data.length === 0) return;

        const labels = data.map(d => new Date(d.date_obs).toLocaleString("fr-FR", { day: "2-digit", hour: "2-digit", minute: "2-digit" }));
        const serie = data.map(d => Number(d.resultat_obs) / 1000);

        const ctx = document.getElementById("graph").getContext("2d");
        myChart = new Chart(ctx, {
            type: "line",
            data: {
                labels,
                datasets: [
                    { label: "Débit (m³/s)", data: serie, borderColor: "#007bff", borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false },
                    { label: `Étiage`, data: labels.map(() => DEBIT_ETIAGE), borderColor: "#dc3545", borderDash: [5, 5], borderWidth: 1.5, pointRadius: 0 },
                    { label: `Hors étiage`, data: labels.map(() => DEBIT_HORS_ETIAGE), borderColor: "#28a745", borderDash: [5, 5], borderWidth: 1.5, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { ticks: { callback: v => v.toLocaleString("fr-FR") + " m³/s" } },
                    x: { ticks: { maxTicksLimit: 7 } }
                },
                plugins: { legend: { position: 'bottom' } }
            }
        });
    });
}
</script>
</body>
</html>
